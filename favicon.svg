<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Warm sage background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#4a7c6f"/>
      <stop offset="100%" stop-color="#2d5248"/>
    </radialGradient>
    <!-- Soft glow for the open arc -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- A gentle open lotus / releasing shape:
       Three curved petals opening upward — symbolising openness, release, letting go.
       Built from arcs. -->

  <!-- Central stem / grounding line -->
  <line x1="256" y1="340" x2="256" y2="390"
        stroke="#c8dfd5" stroke-width="14" stroke-linecap="round" opacity="0.7"/>

  <!-- Left petal -->
  <path d="M256 340
           C220 300, 160 280, 155 230
           C150 185, 195 168, 220 195
           C238 215, 248 270, 256 340Z"
        fill="none"
        stroke="#e8f3ee"
        stroke-width="13"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.92"
        filter="url(#glow)"/>

  <!-- Right petal -->
  <path d="M256 340
           C292 300, 352 280, 357 230
           C362 185, 317 168, 292 195
           C274 215, 264 270, 256 340Z"
        fill="none"
        stroke="#e8f3ee"
        stroke-width="13"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.92"
        filter="url(#glow)"/>

  <!-- Centre petal — taller, opening upward -->
  <path d="M256 340
           C256 280, 210 210, 220 155
           C228 110, 284 110, 292 155
           C302 210, 256 280, 256 340Z"
        fill="none"
        stroke="#f5faf7"
        stroke-width="15"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.97"
        filter="url(#glow)"/>

  <!-- Tiny floating release dot — a breath releasing upward -->
  <circle cx="256" cy="112" r="10" fill="#c8dfd5" opacity="0.6"/>
  <circle cx="256" cy="84"  r="6"  fill="#c8dfd5" opacity="0.38"/>
  <circle cx="256" cy="62"  r="3.5" fill="#c8dfd5" opacity="0.2"/>
</svg>
